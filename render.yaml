services:
  - type: web
    name: sales-audit-2-0
    runtime: node
    plan: free
    buildCommand: npm ci --legacy-peer-deps && npm run build
    startCommand: node server/server.js
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: PORT
        value: 10000
      - key: DEEPSEEK_API_KEY
        sync: false
